<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="light only">
  <meta name="theme-color" content="#0A2540">
  <title>Hit Fest Bucovina · Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="script" href="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous">
  <link rel="preload" as="script" href="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous">
  <link rel="preload" as="style" href="tokens.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <style>
    :root { color-scheme: light; }
    html, body { margin: 0; height: 100%; background: #0A2540; }
    body {
      font-family: "Inter", system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      box-sizing: border-box;
      background:
        radial-gradient(circle at 20% 10%, rgba(26,188,156,0.18), transparent 55%),
        radial-gradient(circle at 85% 90%, rgba(255,107,122,0.18), transparent 55%),
        #0A2540;
    }
    #root { display: contents; }
    @media (prefers-color-scheme: dark) {
      :root, html, body { color-scheme: light !important; background: #0A2540; }
    }
    @media (max-width: 460px) {
      body { padding: 0; background: #f0eee9; }
      .demo-stage { width: 100vw !important; height: 100vh !important; }
      .demo-stage > .demo-device { width: 100% !important; height: 100% !important; border-radius: 0 !important; box-shadow: none !important; }
      .demo-stage > .demo-device > .demo-island { display: none; }
    }
    /* Loading splash — visible until React mounts */
    #loading {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 18px;
      background: transparent; color: #FAF6E8;
      font-family: "Bebas Neue", system-ui, sans-serif;
      letter-spacing: 0.08em;
      transition: opacity 200ms ease;
    }
    #loading.hide { opacity: 0; pointer-events: none; }
    .spinner {
      width: 42px; height: 42px; border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.18);
      border-top-color: #FF6B7A;
      animation: hf-spin 0.8s linear infinite;
    }
    @keyframes hf-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <div style="font-size:14px; opacity:0.85;">HIT FEST BUCOVINA</div>
  </div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="ios-frame.js"></script>
  <script src="design-canvas.js"></script>
  <script src="data.js"></script>
  <script src="i18n.js"></script>
  <script src="components.js"></script>
  <script src="screens-1.js"></script>
  <script src="screens-2.js"></script>
  <script src="screens-3.js"></script>
  <script src="settings.js"></script>
  <script src="validation.js"></script>
  <script src="validation-flow.js"></script>
  <script src="flow-integration.js"></script>
  <script src="app.js"></script>
  <script src="single-view.js"></script>
  <script>
    // Hide loading splash once React has mounted (next animation frame)
    requestAnimationFrame(() => {
      const el = document.getElementById('loading');
      if (el) { el.classList.add('hide'); setTimeout(() => el.remove(), 220); }
    });
  </script>
</body>
</html>
